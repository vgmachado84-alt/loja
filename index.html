<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Center Pet - Catálogo</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Center Pet">
    <link rel="icon" type="image/png" href="https://vgmachado84-alt.github.io/loja/logo.png">

    <style>
        /* CSS Básico para parecer App */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            -webkit-tap-highlight-color: transparent;
        }
        header {
            background-color: #ffffff;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #cc0000;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { width: 120px; }
        .container { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .produto { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .produto img { width: 100%; border-radius: 5px; }
        .preco { color: #cc0000; font-weight: bold; font-size: 1.2em; margin: 5px 0; }
        .btn-add {
            background-color: #cc0000;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .carrinho-flutuante {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            color: white;
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <img src="https://vgmachado84-alt.github.io/loja/logo.png" alt="Center Pet" class="logo">
    <div style="font-size: 0.8em; color: #666;">PIMENTA BUENO - RO</div>
</header>

<div class="container">
    <div class="produto">
        <img src="https://vgmachado84-alt.github.io/loja/mistura-galo.jpg" alt="Mistura Galo">
        <h3>Mistura para galo</h3>
        <p>10kg</p>
        <div class="preco">R$ 69,90</div>
        <button class="btn-add" onclick="adicionar('Mistura para Galo - 10kg', 69.90)">Adicionar</button>
    </div>

    <div class="produto">
        <img src="https://vgmachado84-alt.github.io/loja/calopsita.jpg" alt="Mistura Calopsita">
        <h3>Mistura para calopsita</h3>
        <p>1kg</p>
        <div class="preco">R$ 9,00</div>
        <button class="btn-add" onclick="adicionar('Mistura Calopsita - 1kg', 9.00)">Adicionar</button>
    </div>
</div>

<a href="#" class="carrinho-flutuante" onclick="enviarWhatsApp()">
    🛒 Finalizar Pedido
</a>

<script>
    let itens = [];

    function adicionar(nome, preco) {
        itens.push({nome, preco});
        alert(nome + " adicionado!");
    }

    function enviarWhatsApp() {
        if (itens.length === 0) {
            alert("O carrinho está vazio!");
            return;
        }
        let mensagem = "Olá Center Pet! Gostaria de pedir:\n\n";
        itens.forEach(item => {
            mensagem += "- " + item.nome + " (R$ " + item.preco.toFixed(2) + ")\n";
        });
        
        // Número da Center Pet atualizado
        let fone = "5569999760742";
        window.open("https://api.whatsapp.com/send?phone=" + fone + "&text=" + encodeURIComponent(mensagem));
    }
</script>

</body>
</html>
