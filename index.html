<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Pet - Catálogo</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        /* AJUSTES VISUAIS QUE VOCÊ PEDIU */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        
        /* Ajuste do Modal para não cortar a imagem */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto; /* Empurra o modal para baixo */
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: contain; /* Faz a imagem aparecer inteira */
            background: #fff;
        }

        /* Ajuste do "A partir de" para pular linha */
        .preco-container {
            padding: 15px;
            display: flex;
            flex-direction: column; /* Um embaixo do outro */
        }

        .texto-apartir {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .valor-principal {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
        }

        .estoque-info {
            font-size: 14px;
            color: #e67e22;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-whats {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            margin: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <img id="imgModal" class="modal-img" src="">
            <div class="preco-container">
                <span class="texto-apartir">A partir de</span>
                <span id="precoModal" class="valor-principal">R$ 0,00</span>
                <div id="estoqueModal" class="estoque-info"></div>
            </div>
            
            <a href="#" id="linkWhats" class="btn-whats">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="25" style="margin-right: 10px;">
                Pedir no WhatsApp
            </a>
        </div>
    </div>

    <script>
        // Esta é a função que você precisa para o estoque aparecer
        function abrirModal(produto) {
            document.getElementById('imgModal').src = produto.imagem;
            document.getElementById('precoModal').innerText = 'R$ ' + produto.preco;
            
            // Aqui faz o estoque aparecer
            const estoque = produto.estoque || 0;
            document.getElementById('estoqueModal').innerText = 'Estoque disponível: ' + estoque + ' unidades';
            
            document.getElementById('meuModal').style.display = "block";
        }
        
        // Registrar o App (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
