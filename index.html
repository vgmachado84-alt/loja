<script>
function renderVars() {
    const varsContainer = document.getElementById('m-vars');
    
    varsContainer.innerHTML = selectedProduct.variations.map((v, idx) => {
        // Se estiver em promoção, o preço exibido no botão é o promoPrice. Caso contrário, é o preço da variação.
        const precoBotao = selectedProduct.estaEmOferta ? selectedProduct.precoFinalCalculado : Number(v.price);
        
        const isActive = selectedVar.weight === v.weight ? 'active' : '';
        
        return `
            <button class="var-btn ${isActive}" onclick="selectVar(${idx})">
                <span class="var-weight">${v.weight}</span>
                <span class="var-price">R$ ${precoBotao.toFixed(2)}</span>
            </button>
        `;
    }).join('');
}
</script>

<style>
    .var-btn {
        border: 2px solid #ddd;
        padding: 10px;
        border-radius: 12px;
        background: white;
        margin: 5px;
        flex: 1;
        min-width: 100px;
        display: flex;
        flex-direction: column; /* Coloca o preço embaixo do peso */
        align-items: center;
        gap: 4px;
        cursor: pointer;
        transition: 0.2s;
    }
    
    .var-btn.active {
        border-color: var(--orange);
        background: #fff5ee;
    }
    
    .var-weight {
        font-weight: bold;
        font-size: 14px;
        color: #333;
    }
    
    .var-btn.active .var-weight {
        color: var(--orange);
    }
    
    .var-price {
        font-size: 12px;
        color: #888;
    }
    
    .var-btn.active .var-price {
        color: var(--orange);
        font-weight: bold;
    }
</style>
