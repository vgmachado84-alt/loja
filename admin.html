<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Center Pet</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // SUA CONFIGURAÇÃO ORIGINAL DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO PARA SALVAR PRODUTO
        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value;
            const img = document.getElementById('p-img').value; // CAMPO DE FOTO AQUI
            const code = document.getElementById('p-code').value;
            const desc = document.getElementById('p-desc').value;
            const cat = document.getElementById('p-cat').value;
            const stock = Number(document.getElementById('p-stock').value);

            const varRows = document.querySelectorAll('.var-row');
            let variations = [];

            varRows.forEach(row => {
                variations.push({
                    weight: row.querySelector('.v-weight').value,
                    price: Number(row.querySelector('.v-price').value),
                    promoPrice: Number(row.querySelector('.v-promo-price').value),
                    isPromo: row.querySelector('.v-is-promo').checked
                });
            });

            if(!name || !img) return alert("Nome e Foto são obrigatórios!");

            try {
                await addDoc(collection(db, "produtos"), {
                    name, img, code, desc, cat, stock, variations, order: Date.now()
                });
                alert("Produto salvo com sucesso!");
                location.reload();
            } catch (e) {
                console.error("Erro ao salvar: ", e);
            }
        };

        window.addVarRow = () => {
            const container = document.getElementById('vars-container');
            const div = document.createElement('div');
            div.className = 'var-row';
            div.innerHTML = `
                <input type="text" class="v-weight" placeholder="Peso (ex: 10kg)">
                <input type="number" class="v-price" placeholder="Preço Normal">
                <input type="number" class="v-promo-price" placeholder="Preço Promo">
                <label><input type="checkbox" class="v-is-promo"> Ativar Promo</label>
                <button onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        };
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .form-container { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .var-row { display: flex; gap: 5px; background: #eee; padding: 10px; margin: 5px 0; border-radius: 5px; align-items: center; }
        .var-row input { margin: 0; padding: 5px; }
        .btn-main { background: #ff7800; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #333; color: white; border: none; padding: 10px; margin: 10px 0; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Cadastrar Produto - Center Pet</h2>
    
    <input type="text" id="p-name" placeholder="Nome do Produto">
    <input type="text" id="p-img" placeholder="URL da Foto do Produto"> <input type="text" id="p-code" placeholder="Código">
    
    <select id="p-cat">
        <option value="Cães">Cães</option>
        <option value="Gatos">Gatos</option>
        <option value="Aves">Aves</option>
    </select>

    <textarea id="p-desc" placeholder="Descrição"></textarea>
    <input type="number" id="p-stock" placeholder="Estoque">

    <div id="vars-container">
        <p><b>Variações de Preço:</b></p>
    </div>
    <button class="btn-add" onclick="addVarRow()">+ Adicionar Peso/Preço</button>

    <button class="btn-main" onclick="saveProduct()">SALVAR PRODUTO</button>
</div>

</body>
</html>
