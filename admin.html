<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Center Pet</title>
    <style>
        :root { --orange: #ff7800; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .admin-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid var(--orange); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        
        .var-row { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 10px; position: relative; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        .promo-area { 
            display: flex; align-items: center; gap: 10px; margin-top: 10px; 
            padding-top: 10px; border-top: 1px dashed #ddd;
        }
        
        .btn-save { background: var(--orange); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .btn-add { background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .remove-var { color: #ff0000; cursor: pointer; font-weight: bold; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h3>📦 Gestão de Produto</h3>
        
        <div class="input-group">
            <label>Nome do Produto</label>
            <input type="text" id="p-name" placeholder="Ex: Ração Golden Special Cães Adultos">
        </div>

        <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
            <div class="input-group">
                <label>Código do Produto</label>
                <input type="text" id="p-code" placeholder="Cód. Barras ou SKU">
            </div>
            <div class="input-group">
                <label>Categoria</label>
                <select id="p-cat">
                    <option value="Cães">Cães</option>
                    <option value="Gatos">Gatos</option>
                    <option value="Pássaros">Pássaros</option>
                    <option value="Acessórios">Acessórios</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>URL da Imagem (Link da Foto)</label>
            <input type="text" id="p-img" placeholder="https://exemplo.com/foto-do-produto.jpg">
            <small style="color: #888; font-size: 11px;">Dica: Use links diretos do Google Fotos, ImgBB ou similares.</small>
        </div>

        <div class="input-group">
            <label>Descrição</label>
            <textarea id="p-desc" placeholder="Detalhes técnicos, benefícios, etc..."></textarea>
        </div>

        <div class="input-group">
            <label>Estoque Geral</label>
            <input type="number" id="p-stock" value="0">
        </div>

        <hr>
        <h4>Variações de Peso e Preço</h4>
        <div id="vars-container"></div>
        <button type="button" class="btn-add" onclick="addVarRow()">+ Adicionar Variação (Peso/Preço)</button>

        <button class="btn-save" onclick="saveProduct()">SALVAR PRODUTO NO SISTEMA</button>
    </div>
</div>

<script>
    // Função para adicionar uma nova linha de variação (Peso + Preço + Promoção)
    function addVarRow() {
        const container = document.getElementById('vars-container');
        const row = document.createElement('div');
        row.className = 'var-row';
        row.innerHTML = `
            <span class="remove-var" onclick="this.parentElement.remove()">✕ Remover</span>
            <div class="grid-3">
                <div>
                    <label>Peso/Tamanho</label>
                    <input type="text" class="v-weight" placeholder="Ex: 1kg ou 15kg">
                </div>
                <div>
                    <label>Preço Normal (R$)</label>
                    <input type="number" class="v-price" step="0.01" placeholder="0.00">
                </div>
                <div>
                    <label>Preço Promo (R$)</label>
                    <input type="number" class="v-promo-price" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="promo-area">
                <input type="checkbox" class="v-is-promo" style="width: auto;">
                <label style="margin: 0;">Ativar Promoção para este peso?</label>
            </div>
        `;
        container.appendChild(row);
    }

    // Ao carregar o Admin, já começa com uma variação vazia
    window.onload = () => {
        addVarRow();
    };

    async function saveProduct() {
        // Aqui entra a sua lógica do Firebase para salvar
        // Lembre-se de capturar o valor de document.getElementById('p-img').value
        alert("Produto pronto para ser salvo com foto e preços riscados!");
    }
</script>

</body>
</html>
