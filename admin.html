<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Center Pet</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SISTEMA DE SENHA ---
        window.verificarSenha = () => {
            const senha = document.getElementById('senha-input').value;
            if(senha === "102030") { // Coloque sua senha aqui
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        };

        // --- LÓGICA DE SALVAMENTO ---
        window.saveProduct = async () => {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            const product = {
                name: document.getElementById('p-name').value,
                img: document.getElementById('p-img').value,
                code: document.getElementById('p-code').value,
                cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                stock: Number(document.getElementById('p-stock').value),
                variations: [],
                order: Date.now()
            };

            document.querySelectorAll('.var-row').forEach(row => {
                product.variations.push({
                    weight: row.querySelector('.v-weight').value,
                    price: Number(row.querySelector('.v-price').value),
                    promoPrice: Number(row.querySelector('.v-promo-price').value),
                    isPromo: row.querySelector('.v-is-promo').checked
                });
            });

            if(!product.name || !product.img) {
                alert("Preencha Nome e Foto!");
                btn.disabled = false;
                btn.innerText = "SALVAR PRODUTO";
                return;
            }

            try {
                await addDoc(collection(db, "produtos"), product);
                alert("Produto cadastrado com sucesso!");
                location.reload();
            } catch (e) {
                alert("Erro ao salvar!");
                btn.disabled = false;
            }
        };

        window.addVarRow = () => {
            const container = document.getElementById('vars-container');
            const div = document.createElement('div');
            div.className = 'var-row';
            div.innerHTML = `
                <input type="text" class="v-weight" placeholder="Peso (ex: 1kg)">
                <input type="number" class="v-price" placeholder="Preço Normal">
                <input type="number" class="v-promo-price" placeholder="Preço Promo">
                <label style="font-size:10px;"><input type="checkbox" class="v-is-promo"> Promo?</label>
                <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; border-radius:4px;">X</button>
            `;
            container.appendChild(div);
        };
    </script>
    <style>
        :root { --orange: #ff7800; }
        body { font-family: sans-serif; background: #f0f2f1; margin: 0; padding: 20px; }
        
        /* Estilo Login */
        #login-screen { max-width: 300px; margin: 100px auto; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Estilo Admin */
        #admin-content { display: none; max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .var-row { display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr 0.4fr; gap: 5px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 5px; align-items: center; }
        .var-row input { padding: 5px; margin: 0; font-size: 12px; }
        .btn-orange { background: var(--orange); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-add { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://via.placeholder.com/100?text=Pet" style="margin-bottom:20px; border-radius:50%;">
        <h3>Acesso Restrito</h3>
        <input type="password" id="senha-input" placeholder="Digite a Senha">
        <button class="btn-orange" onclick="verificarSenha()">ENTRAR</button>
    </div>

    <div id="admin-content">
        <h2 style="color:var(--orange); border-bottom: 2px solid #eee; padding-bottom: 10px;">Novo Produto</h2>
        
        <label>Nome do Produto</label>
        <input type="text" id="p-name" placeholder="Ex: Ração Magnus 15kg">
        
        <label>URL da Imagem</label>
        <input type="text" id="p-img" placeholder="Link da foto (ImgBB, Google, etc)">
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="p-code" placeholder="Código/SKU">
            <select id="p-cat">
                <option value="Cães">Cães</option>
                <option value="Gatos">Gatos</option>
                <option value="Pássaros">Pássaros</option>
                <option value="Acessórios">Acessórios</option>
            </select>
        </div>

        <textarea id="p-desc" placeholder="Descrição curta do produto"></textarea>
        <input type="number" id="p-stock" placeholder="Estoque Inicial">

        <h4 style="margin: 20px 0 10px;">Variações e Preços</h4>
        <div id="vars-container">
            </div>
        <button class="btn-add" onclick="addVarRow()">+ Adicionar Peso</button>

        <button class="btn-orange" id="btn-save" onclick="saveProduct()">SALVAR PRODUTO</button>
    </div>

</body>
</html>
