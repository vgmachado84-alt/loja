<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Center Pet</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SENHA DE ACESSO
        window.verificarSenha = () => {
            const s = document.getElementById('senha').value;
            if(s === "102030") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
            } else {
                alert("Senha Incorreta!");
            }
        };

        window.addVarRow = () => {
            const container = document.getElementById('vars');
            const div = document.createElement('div');
            div.className = 'var-row';
            div.innerHTML = `
                <input type="text" class="v-weight" placeholder="Peso">
                <input type="number" class="v-price" placeholder="Preço Normal">
                <input type="number" class="v-promo" placeholder="Preço Promo">
                <label><input type="checkbox" class="v-is-promo"> Promo?</label>
                <button onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        };

        window.saveProduct = async () => {
            const variations = [];
            document.querySelectorAll('.var-row').forEach(row => {
                variations.push({
                    weight: row.querySelector('.v-weight').value,
                    price: Number(row.querySelector('.v-price').value),
                    promoPrice: Number(row.querySelector('.v-promo').value),
                    isPromo: row.querySelector('.v-is-promo').checked
                });
            });

            const data = {
                name: document.getElementById('p-name').value,
                img: document.getElementById('p-img').value, // CAMPO QUE VOCÊ PEDIU
                code: document.getElementById('p-code').value,
                cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                stock: Number(document.getElementById('p-stock').value),
                variations: variations,
                order: Date.now()
            };

            if(!data.name || !data.img) return alert("Preencha Nome e Foto!");

            try {
                await addDoc(collection(db, "produtos"), data);
                alert("Salvo!");
                location.reload();
            } catch (e) { alert("Erro!"); }
        };
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .var-row { display: flex; gap: 5px; background: #f9f9f9; padding: 5px; margin-bottom: 5px; align-items: center; border: 1px solid #ddd; }
        .var-row input { padding: 5px; }
        .btn-add { background: #333; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
        .btn-save { background: #ff7800; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login" class="box" style="text-align:center; margin-top: 50px;">
        <h2>Acesso Admin</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-save" onclick="verificarSenha()">ENTRAR</button>
    </div>

    <div id="painel" class="box" style="display:none;">
        <h2>Novo Produto</h2>
        <input type="text" id="p-name" placeholder="Nome do Produto">
        
        <label style="font-size: 11px; font-weight: bold;">URL da Imagem:</label>
        <input type="text" id="p-img" placeholder="Cole aqui o link da foto">
        
        <input type="text" id="p-code" placeholder="Código">
        
        <select id="p-cat">
            <option value="Cães">Cães</option>
            <option value="Gatos">Gatos</option>
            <option value="Pássaros">Pássaros</option>
            <option value="Acessórios">Acessórios</option>
        </select>

        <textarea id="p-desc" placeholder="Descrição"></textarea>
        <input type="number" id="p-stock" placeholder="Estoque">

        <div id="vars">
            <p><b>Variações:</b></p>
        </div>
        <button class="btn-add" onclick="addVarRow()">+ Adicionar Peso</button>

        <button class="btn-save" onclick="saveProduct()">SALVAR NO BANCO</button>
    </div>

</body>
</html>
