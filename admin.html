<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center Pet - Gestão e Impressão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #2d5a27; --orange: #ff7800; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 50px; }
        
        /* TELA DE LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .login-card button { width: 100%; background: var(--orange); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* INTERFACE ADMIN */
        #admin-wrapper { display: none; }
        .tabs { display: flex; background: var(--green); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px; border: none; color: white; background: none; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .tab-btn.active { background: #1e3d1a; border-bottom: 3px solid #fff; }
        .tab-content { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .tab-content.active { display: block; }
        
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .item { display: flex; justify-content: space-between; background: white; padding: 12px; margin-top: 8px; border-radius: 8px; align-items: center; border: 1px solid #eee; }
        .var-row-box { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .btn-save { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div style="background: var(--green); color: white; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: bold;">CENTER PET ADMIN</div>
            <input type="email" id="login-email" placeholder="E-mail" autocomplete="off">
            <input type="password" id="login-pass" placeholder="Senha" autocomplete="new-password">
            <button onclick="handleLogin()">ENTRAR NO PAINEL</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="admin-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('tab-pedidos')">📥 PEDIDOS</button>
            <button class="tab-btn" onclick="openTab('tab-cadastro')">📦 PRODUTOS</button>
            <button class="tab-btn" onclick="openTab('tab-categoria')">📂 CATEGORIAS</button>
            <button class="tab-btn" onclick="handleLogout()" style="color:#ffcccc">SAIR</button>
        </div>

        <div id="tab-pedidos" class="tab-content active">
            <h3 style="color:var(--green)">Pedidos Recentes</h3>
            <div id="pedidos-list"></div>
        </div>

        <div id="tab-cadastro" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Gerenciar Produto</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="code" placeholder="Cód. Ref">
                    <input type="number" id="stock" placeholder="Estoque">
                </div>
                <input type="text" id="name" placeholder="Nome do Produto">
                <textarea id="desc" placeholder="Descrição" rows="3"></textarea>
                <select id="cat-select"></select>
                <input type="file" accept="image/*" onchange="handleFile(event)">
                <div id="vars" style="margin-top:15px;"></div>
                <button onclick="addVar()" style="width:100%; padding:10px; border:2px dashed var(--green); background:none; color:var(--green); font-weight:bold; border-radius:10px;">+ Adicionar Peso/Preço</button>
                <button class="btn-save" id="btn-main-save" onclick="saveProduct()">SALVAR PRODUTO</button>
            </div>
            <div id="prod-list"></div>
        </div>

        <div id="tab-categoria" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Categorias</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-cat" placeholder="Ex: Rações, Acessórios...">
                    <button onclick="addCategory()" style="background:var(--green); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">ADD</button>
                </div>
            </div>
            <div id="cat-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let photoBase64 = "", editId = null;

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Dados Incorretos"));
        };

        window.handleLogout = () => { if(confirm("Sair?")) signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-wrapper').style.display = 'block';
                initData();
            }
        });

        function initData() {
            // PEDIDOS
            onSnapshot(query(collection(db, "pedidos"), orderBy("timestamp", "desc")), snap => {
                const list = document.getElementById('pedidos-list');
                list.innerHTML = snap.docs.map(d => `
                    <div class="box item">
                        <div style="flex:1"><b>${d.data().cliente}</b><br><small>R$ ${d.data().total}</small></div>
                        <button onclick="imprimirCupom('${d.id}')" style="background:#333; color:white; border:none; padding:8px; border-radius:5px;">🖨️</button>
                    </div>
                `).join('');
                window.pedidosData = snap.docs.map(d => ({id: d.id, ...d.data()}));
            });

            // CATEGORIAS
            onSnapshot(query(collection(db, "categorias"), orderBy("order", "asc")), (snap) => {
                const list = document.getElementById('cat-list');
                const select = document.getElementById('cat-select');
                list.innerHTML = snap.docs.map(d => `
                    <div class="item" data-id="${d.id}"><span>☰ ${d.data().nome}</span>
                    <button onclick="deleteItem('categorias', '${d.id}')" style="color:red; background:none; border:none;">🗑️</button></div>
                `).join('');
                select.innerHTML = snap.docs.map(d => `<option value="${d.data().nome}">${d.data().nome}</option>`).join('');
            });

            // PRODUTOS
            onSnapshot(query(collection(db, "produtos"), orderBy("order", "asc")), snap => {
                const list = document.getElementById('prod-list');
                window.prods = snap.docs.map(d => ({id: d.id, ...d.data()}));
                list.innerHTML = window.prods.map(p => `
                    <div class="item" data-id="${p.id}">
                        <div style="flex:1"><b>${p.name}</b><br><small>Estoque: ${p.stock}</small></div>
                        <button onclick="editProd('${p.id}')" style="background:#eee; border:none; padding:8px; border-radius:5px;">✏️</button>
                        <button onclick="deleteItem('produtos', '${p.id}')" style="background:#eee; border:none; padding:8px; border-radius:5px;">🗑️</button>
                    </div>
                `).join('');
            });
        }

        window.openTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        window.addVar = (w="", p="") => {
            const div = document.createElement('div');
            div.className = 'var-row-box';
            div.innerHTML = `<input type="text" placeholder="Peso" value="${w}" class="v-w"> <input type="number" placeholder="Preço" value="${p}" class="v-p"> <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; font-size:10px;">remover</button>`;
            document.getElementById('vars').appendChild(div);
        };

        window.saveProduct = async () => {
            const btn = document.getElementById('btn-main-save');
            const varRows = Array.from(document.querySelectorAll('.var-row-box'));
            const variations = varRows.map(r => ({ weight: r.querySelector('.v-w').value, price: parseFloat(r.querySelector('.v-p').value) || 0 }));
            
            const data = {
                code: document.getElementById('code').value,
                name: document.getElementById('name').value,
                desc: document.getElementById('desc').value,
                cat: document.getElementById('cat-select').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                variations: variations,
                updatedAt: serverTimestamp()
            };
            if(photoBase64) data.img = photoBase64;

            if(editId) await updateDoc(doc(db, "produtos", editId), data);
            else { data.order = 0; await addDoc(collection(db, "produtos"), data); }
            alert("Sucesso!"); location.reload();
        };

        window.editProd = (id) => {
            const p = window.prods.find(i => i.id === id);
            editId = id;
            document.getElementById('code').value = p.code || "";
            document.getElementById('name').value = p.name;
            document.getElementById('stock').value = p.stock;
            document.getElementById('desc').value = p.desc || "";
            document.getElementById('cat-select').value = p.cat;
            document.getElementById('vars').innerHTML = "";
            if(p.variations) p.variations.forEach(v => addVar(v.weight, v.price));
            openTab('tab-cadastro');
        };

        window.addCategory = async () => {
            const nome = document.getElementById('new-cat').value;
            if(nome) await addDoc(collection(db, "categorias"), { nome, order: 0 });
            document.getElementById('new-cat').value = "";
        };

        window.deleteItem = async (col, id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, col, id)); };

        window.handleFile = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => photoBase64 = event.target.result;
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
