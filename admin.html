<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Center Pet</title>
    <style>
        /* ESTILOS DE SEGURANÇA E VISUAL */
        body { font-family: sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border: 1px solid #eee; }
        .orange-bar { background: #ff7800; color: white; padding: 15px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: #ff7800; }
        button { width: 100%; background: #ff7800; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        
        /* CONTEÚDO OCULTO ANTES DO LOGIN */
        #admin-content { display: none; padding: 20px; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); sticky: top; }
        .btn-new { background: #ff7800; color: white; padding: 15px; border-radius: 15px; text-decoration: none; display: block; text-align: center; margin-bottom: 20px; font-weight: bold; border: none; width: 100%; }
        .prod-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .prod-img { width: 50px; hieght: 50px; object-fit: contain; }
        .prod-info { flex: 1; }
        .prod-name { font-weight: bold; font-size: 14px; color: #333; margin: 0; }
        .prod-meta { font-size: 11px; color: #888; margin: 2px 0; }
        .btn-del { background: #fff1f1; color: #ff4444; border: none; padding: 10px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card">
            <div class="orange-bar">CENTER PET ADMIN</div>
            <h2 style="margin: 0; color: #333;">Acesso Restrito</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Use seu e-mail e senha do Firebase</p>
            
            <input type="email" id="login-email" placeholder="Seu e-mail">
            <input type="password" id="login-pass" placeholder="Sua senha">
            <button onclick="handleLogin()">ENTRAR NO PAINEL</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <b style="color: #ff7800; letter-spacing: -1px;">CENTER PET <small style="color:#999">ADMIN</small></b>
            <button onclick="handleLogout()" style="background:none; color: #888; font-size: 12px; border: none; width: auto; margin: 0; padding: 5px;">SAIR</button>
        </div>
        
        <br>
        
        <button onclick="alert('Sistema de cadastro pronto! Me confirme se o login funcionou.')" class="btn-new">+ CADASTRAR NOVO PRODUTO</button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-weight: bold; font-size: 12px; color: #555; text-transform: uppercase;">Produtos em Linha</span>
            <span id="counter" style="background: #ddd; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold;">0</span>
        </div>

        <div id="list-prods">
            <p style="text-align: center; color: #999; padding: 40px;">Carregando seu estoque...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Função de Login
        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const error = document.getElementById('login-error');
            
            error.innerText = "VERIFICANDO...";
            
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                error.innerText = "ACESSO NEGADO: DADOS INCORRETOS";
            });
        };

        // Função de Sair
        window.handleLogout = () => signOut(auth);

        // Observador de Login (A mágica que esconde/mostra a tela)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadInventory();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        // Carregar Produtos em Tempo Real
        function loadInventory() {
            onSnapshot(query(collection(db, "produtos"), orderBy("order", "asc")), snap => {
                const list = document.getElementById('list-prods');
                const count = document.getElementById('counter');
                
                if (snap.empty) {
                    list.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum produto cadastrado.</p>";
                    count.innerText = "0";
                    return;
                }

                count.innerText = snap.size;
                list.innerHTML = snap.docs.map(d => {
                    const p = d.data();
                    return `
                        <div class="prod-card">
                            <img src="${p.img}" class="prod-img">
                            <div class="prod-info">
                                <p class="prod-name">${p.name}</p>
                                <p class="prod-meta">${p.cat.toUpperCase()} • R$ ${p.price}</p>
                            </div>
                            <button onclick="deleteItem('${d.id}')" class="btn-del">🗑</button>
                        </div>
                    `;
                }).join('');
            });
        }

        window.deleteItem = async (id) => {
            if(confirm("Deseja mesmo excluir este produto?")) {
                await deleteDoc(doc(db, "produtos", id));
            }
        };
    </script>
</body>
</html>
