<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center Pet - Gestão e Impressão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #2d5a27; --orange: #ff7800; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 50px; }
        
        /* TELA DE LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .login-card button { width: 100%; background: var(--orange); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* INTERFACE ADMIN */
        #admin-wrapper { display: none; }
        .tabs { display: flex; background: var(--green); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px; border: none; color: white; background: none; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .tab-btn.active { background: #1e3d1a; border-bottom: 3px solid #fff; }
        .tab-content { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .tab-content.active { display: block; }
        
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .item { display: flex; justify-content: space-between; background: white; padding: 12px; margin-top: 8px; border-radius: 8px; align-items: center; border: 1px solid #eee; }
        .pedido-card { border-left: 5px solid var(--orange); margin-bottom: 10px; }
        .btn-print { background: #333; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .var-row-box { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn-save { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* ESTILO OCULTO PARA IMPRESSÃO */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 58mm; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div style="background: var(--green); color: white; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: bold;">CENTER PET ADMIN</div>
            <input type="email" id="login-email" placeholder="E-mail" autocomplete="off">
            <input type="password" id="login-pass" placeholder="Senha" autocomplete="new-password">
            <button onclick="handleLogin()">ENTRAR NO PAINEL</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 15px; font-weight: bold; min-height: 15px;"></p>
        </div>
    </div>

    <div id="admin-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('tab-pedidos')">📥 PEDIDOS</button>
            <button class="tab-btn" onclick="openTab('tab-cadastro')">📦 PRODUTOS</button>
            <button class="tab-btn" onclick="openTab('tab-categoria')">📂 CATEGORIAS</button>
            <button class="tab-btn" onclick="openTab('tab-config')">⚙️ AJUSTES</button>
            <button class="tab-btn" onclick="handleLogout()" style="color:#ffcccc">SAIR</button>
        </div>

        <div id="tab-pedidos" class="tab-content active">
            <h3 style="color:var(--green)">Pedidos Recentes</h3>
            <div id="pedidos-list">
                <p style="text-align:center; color:#999;">Carregando pedidos...</p>
            </div>
        </div>

        <div id="tab-cadastro" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Gerenciar Produto</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="code" placeholder="Cód. Ref">
                    <input type="number" id="stock" placeholder="Estoque">
                </div>
                <input type="text" id="name" placeholder="Nome do Produto">
                <textarea id="desc" placeholder="Descrição" rows="3"></textarea>
                <select id="cat-select"></select>
                <input type="file" accept="image/*" onchange="handleFile(event)">
                <div id="vars" style="margin-top:15px;"></div>
                <button onclick="addVar()" style="width:100%; padding:10px; border:2px dashed var(--green); background:none; color:var(--green); font-weight:bold; border-radius:10px;">+ Adicionar Peso/Preço</button>
                <button class="btn-save" id="btn-main-save" onclick="saveProduct()">SALVAR PRODUTO</button>
            </div>
            <div id="prod-list"></div>
        </div>

        <div id="tab-categoria" class="tab-content">
            <div class="box">
                <input type="text" id="new-cat" placeholder="Nova Categoria">
                <button onclick="addCategory()" class="btn-save">ADICIONAR CATEGORIA</button>
            </div>
            <div id="cat-list"></div>
        </div>
        
        <div id="tab-config" class="tab-content">
            <div class="box">
                <h3>Configurações da Loja</h3>
                <p>Ajuste o logo e informações de contato aqui.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let photoBase64 = "", editId = null;

        // --- LOGIN ---
        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Erro no Login"));
        };

        window.handleLogout = () => { if(confirm("Sair?")) signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-wrapper').style.display = 'block';
                loadData();
            }
        });

        function loadData() {
            // Carregar Pedidos
            onSnapshot(query(collection(db, "pedidos"), orderBy("timestamp", "desc")), snap => {
                const list = document.getElementById('pedidos-list');
                list.innerHTML = snap.docs.map(d => {
                    const p = d.data();
                    const dataFormatada = p.timestamp ? new Date(p.timestamp.seconds * 1000).toLocaleString() : 'Recentemente';
                    return `
                        <div class="box item pedido-card">
                            <div style="flex:1">
                                <b>${p.cliente}</b> <br>
                                <small>${dataFormatada}</small> <br>
                                <span style="color:var(--orange); font-weight:bold;">Total: R$ ${p.total}</span>
                            </div>
                            <button class="btn-print" onclick="imprimirCupom('${d.id}')">🖨️ IMPRIMIR</button>
                        </div>
                    `;
                }).join('');
                window.pedidosData = snap.docs.map(d => ({id: d.id, ...d.data()}));
            });

            // Carregar Produtos (Existente)
            onSnapshot(query(collection(db, "produtos"), orderBy("order", "asc")), snap => {
                const list = document.getElementById('prod-list');
                list.innerHTML = snap.docs.map(d => `<div class="item"><span>${d.data().name}</span> <button onclick="editProd('${d.id}')">✏️</button></div>`).join('');
                window.prods = snap.docs.map(d => ({id: d.id, ...d.data()}));
            });
        }

        // --- FUNÇÃO DE IMPRESSÃO ---
        window.imprimirCupom = (id) => {
            const pedido = window.pedidosData.find(p => p.id === id);
            const win = window.open('', '', 'width=600,height=600');
            win.document.write(`
                <html>
                <body style="font-family:monospace; width:58mm; padding:5px; font-size:12px;">
                    <div style="text-align:center;">
                        <h3 style="margin:0;">CENTER PET</h3>
                        <p>Ji-Paraná - RO</p>
                        <hr>
                        <b>RESUMO DO PEDIDO</b>
                    </div>
                    <p><b>Cliente:</b> ${pedido.cliente}</p>
                    <p><b>Endereço:</b> ${pedido.endereco || 'Retirada'}</p>
                    <hr>
                    <table style="width:100%; font-size:11px;">
                        ${pedido.itens.map(i => `<tr><td>${i.qtd}x ${i.nome}</td><td align="right">R$ ${i.subtotal}</td></tr>`).join('')}
                    </table>
                    <hr>
                    <div style="text-align:center; font-size:14px;"><b>TOTAL: R$ ${pedido.total}</b></div>
                    <hr>
                    <p style="text-align:center;">Obrigado pela preferência!</p>
                    <script>window.onload = function(){ window.print(); window.close(); }<\/script>
                </body>
                </html>
            `);
            win.document.close();
        };

        // --- ABA NAVEGAÇÃO ---
        window.openTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // ... (resto das suas funções de saveProduct, addVar, etc) ...
        window.addVar = (w="", p="") => {
            const div = document.createElement('div');
            div.className = 'var-row-box';
            div.innerHTML = `<input type="text" placeholder="Peso" value="${w}" class="v-w"> <input type="number" placeholder="Preço" value="${p}" class="v-p">`;
            document.getElementById('vars').appendChild(div);
        };

        window.saveProduct = async () => {
            const name = document.getElementById('name').value;
            const stock = parseInt(document.getElementById('stock').value) || 0;
            const data = { name, stock, timestamp: serverTimestamp(), order: 0 };
            await addDoc(collection(db, "produtos"), data);
            alert("Salvo!");
        };

    </script>
</body>
</html>
