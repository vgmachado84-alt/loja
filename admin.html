<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center Pet - Gestão Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #2d5a27; --orange: #ff7800; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 50px; }
        
        /* TELA DE LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .login-card button { width: 100%; background: var(--orange); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* INTERFACE ADMIN */
        #admin-wrapper { display: none; }
        .tabs { display: flex; background: var(--green); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; border: none; color: white; background: none; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { background: #1e3d1a; border-bottom: 3px solid #fff; }
        .tab-content { display: none; padding: 15px; max-width: 550px; margin: auto; }
        .tab-content.active { display: block; }
        
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .item { display: flex; justify-content: space-between; background: white; padding: 12px; margin-top: 8px; border-radius: 8px; align-items: center; border: 1px solid #eee; cursor: move; }
        .var-row-box { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .var-inputs { display: flex; gap: 10px; }
        .var-promo-area { margin-top: 8px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .v-promo-price { background: #fff0f0; border: 1px solid #ffcccc !important; color: #d00; font-weight: bold; }
        .btn-del-var { background: none; border: none; color: #999; text-decoration: underline; font-size: 11px; cursor: pointer; display: block; margin-top: 5px; }
        
        .btn-save { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-logout { color: #ffcccc; flex: 0.4; font-size: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div style="background: var(--green); color: white; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: bold;">CENTER PET ADMIN</div>
            <input type="email" id="login-email" placeholder="E-mail" autocomplete="off">
            <input type="password" id="login-pass" placeholder="Senha" autocomplete="new-password">
            <button onclick="handleLogin()">ENTRAR NO PAINEL</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 15px; font-weight: bold; min-height: 15px;"></p>
        </div>
    </div>

    <div id="admin-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('tab-cadastro')">PRODUTOS</button>
            <button class="tab-btn" onclick="openTab('tab-categoria')">CATEGORIAS</button>
            <button class="tab-btn" onclick="openTab('tab-config')">AJUSTES</button>
            <button class="tab-btn btn-logout" onclick="handleLogout()">SAIR</button>
        </div>

        <div id="tab-cadastro" class="tab-content active">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Gerenciar Produto</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="code" placeholder="Cód. Ref">
                    <input type="number" id="stock" placeholder="Estoque">
                </div>
                <input type="text" id="name" placeholder="Nome do Produto">
                <textarea id="desc" placeholder="Descrição/Detalhes" rows="3"></textarea>
                <select id="cat-select"></select>
                
                <label style="font-size:12px; color:#666;">Foto do Produto:</label>
                <input type="file" accept="image/*" onchange="handleFile(event)">
                
                <div id="vars" style="margin-top:15px;"></div>
                <button onclick="addVar()" style="width:100%; padding:12px; border:2px dashed var(--green); color:var(--green); background:none; font-weight:bold; border-radius:10px;">+ Adicionar Peso e Preço</button>
                
                <button class="btn-save" id="btn-main-save" onclick="saveProduct()">SALVAR PRODUTO</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 5px 10px;">
                <b style="font-size:14px; color:#444;">PRODUTOS CADASTRADOS</b>
                <span id="prod-count" style="background:#ccc; padding:2px 8px; border-radius:10px; font-size:12px;">0</span>
            </div>
            <div id="prod-list"></div>
        </div>

        <div id="tab-categoria" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Categorias</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-cat" placeholder="Ex: Rações, Gaiolas...">
                    <button onclick="addCategory()" style="background:var(--green); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">ADD</button>
                </div>
            </div>
            <div id="cat-list"></div>
        </div>

        <div id="tab-config" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Configurações</h3>
                <label style="font-size:12px; color:#666;">Trocar Logo da Loja:</label>
                <input type="file" accept="image/*" onchange="handleLogo(event)">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let photoBase64 = "", editId = null;

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const err = document.getElementById('login-error');
            if(!email || !pass) return err.innerText = "PREENCHA TODOS OS CAMPOS";
            err.innerText = "VERIFICANDO...";
            signInWithEmailAndPassword(auth, email, pass).catch(() => { err.innerText = "ACESSO NEGADO: DADOS INCORRETOS"; });
        };

        window.handleLogout = () => { 
            if(confirm("Deseja sair do painel?")) {
                signOut(auth).then(() => { location.reload(); });
            }
        };

        onAuthStateChanged(auth, (user) => {
            const err = document.getElementById('login-error');
            if (user) {
                err.innerText = "";
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-wrapper').style.display = 'block';
                initData();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-wrapper').style.display = 'none';
            }
        });

        function initData() {
            onSnapshot(query(collection(db, "categorias"), orderBy("order", "asc")), (snap) => {
                const list = document.getElementById('cat-list');
                const select = document.getElementById('cat-select');
                list.innerHTML = snap.docs.map(d => `
                    <div class="item" data-id="${d.id}">
                        <span>☰ ${d.data().nome}</span>
                        <button onclick="deleteItem('categorias', '${d.id}')" style="color:red; background:none; border:none;">🗑️</button>
                    </div>
                `).join('');
                select.innerHTML = snap.docs.map(d => `<option value="${d.data().nome}">${d.data().nome}</option>`).join('');
            });

            onSnapshot(query(collection(db, "produtos"), orderBy("order", "asc")), snap => {
                window.prods = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const list = document.getElementById('prod-list');
                document.getElementById('prod-count').innerText = snap.size;
                list.innerHTML = window.prods.map(p => {
                    const promo = p.isPromo || (p.variations && p.variations.some(v => v.isPromo));
                    return `
                    <div class="item" data-id="${p.id}">
                        <div style="flex:1">
                            <small style="color:var(--green); font-weight:bold;">[CÓD: ${p.code || '---'}]</small> | 
                            <small style="color:#007bff; font-weight:bold;">EST: ${p.stock || '0'}</small>
                            ${promo ? '<b style="color:red; font-size:10px; margin-left:8px;">🔥 OFERTA</b>' : ''}<br>
                            <b style="font-size:16px; color:#333;">${p.name}</b>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="editProd('${p.id}')">✏️</button>
                            <button onclick="deleteItem('produtos', '${p.id}')">🗑️</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        window.openTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        const catList = document.getElementById('cat-list');
        Sortable.create(catList, { animation: 150, onEnd: () => saveOrder("categorias", catList) });
        const prodList = document.getElementById('prod-list');
        Sortable.create(prodList, { animation: 150, onEnd: () => saveOrder("produtos", prodList) });

        window.addCategory = async () => {
            const nome = document.getElementById('new-cat').value;
            if(nome) await addDoc(collection(db, "categorias"), { nome, order: 0 });
            document.getElementById('new-cat').value = "";
        };

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        window.handleFile = async (e) => {
            const file = e.target.files[0];
            if(file) { photoBase64 = await compressImage(file); alert("Imagem processada!"); }
        };

        window.addVar = (w="", p="", isPromo=false, promoPrice="") => {
            const div = document.createElement('div');
            div.className = 'var-row-box';
            div.innerHTML = `
                <div class="var-inputs">
                    <input type="text" placeholder="Peso/Tam" value="${w}" class="v-w">
                    <input type="number" placeholder="Preço" value="${p}" class="v-p">
                </div>
                <div class="var-promo-area">
                    <label><input type="checkbox" class="v-promo" ${isPromo ? 'checked' : ''} onchange="togglePromoField(this)"> Em Oferta?</label>
                    <input type="number" placeholder="Preço Promo" value="${promoPrice}" class="v-promo-price" style="display: ${isPromo ? 'block' : 'none'}">
                </div>
                <button class="btn-del-var" onclick="this.parentElement.remove()">remover variação</button>`;
            document.getElementById('vars').appendChild(div);
        };

        window.togglePromoField = (el) => {
            const priceInput = el.parentElement.parentElement.querySelector('.v-promo-price');
            priceInput.style.display = el.checked ? 'block' : 'none';
        };

        window.saveProduct = async () => {
            const btn = document.getElementById('btn-main-save');
            const name = document.getElementById('name').value;
            const stockValue = document.getElementById('stock').value; // Pegamos o valor do input
            const varRows = Array.from(document.querySelectorAll('.var-row-box'));
            
            if(!name) return alert("Digite o nome do produto!");
            if(varRows.length === 0) return alert("Adicione pelo menos um Peso e Preço!");

            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            const variations = varRows.map(r => ({
                weight: r.querySelector('.v-w').value,
                price: parseFloat(r.querySelector('.v-p').value) || 0,
                isPromo: r.querySelector('.v-promo').checked,
                promoPrice: r.querySelector('.v-promo').checked ? parseFloat(r.querySelector('.v-promo-price').value) : null
            }));

            const data = {
                code: document.getElementById('code').value,
                name: name,
                desc: document.getElementById('desc').value,
                cat: document.getElementById('cat-select').value,
                stock: parseInt(stockValue) || 0, // ALTERAÇÃO AQUI: Garante que salva como número
                variations: variations,
                updatedAt: serverTimestamp()
            };

            if(photoBase64) data.img = photoBase64;
            
            try {
                if(editId) await updateDoc(doc(db, "produtos", editId), data);
                else { data.order = 0; await addDoc(collection(db, "produtos"), data); }
                alert("Salvo com sucesso!");
                location.reload();
            } catch (e) { alert("Erro ao salvar."); btn.disabled = false; btn.innerText = "SALVAR PRODUTO"; }
        };

        window.editProd = (id) => {
            const p = window.prods.find(i => i.id === id);
            editId = id;
            document.getElementById('code').value = p.code || "";
            document.getElementById('name').value = p.name;
            document.getElementById('desc').value = p.desc || "";
            document.getElementById('stock').value = p.stock || "";
            document.getElementById('cat-select').value = p.cat;
            document.getElementById('vars').innerHTML = "";
            photoBase64 = p.img || "";
            if(p.variations) p.variations.forEach(v => addVar(v.weight, v.price, v.isPromo, v.promoPrice || ""));
            openTab('tab-cadastro');
            window.scrollTo(0,0);
        };

        window.handleLogo = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                await setDoc(doc(db, "config", "layout"), { logo: event.target.result }, { merge: true });
                alert("Logo atualizada!");
            };
            reader.readAsDataURL(file);
        };

        async function saveOrder(col, listEl) {
            const items = listEl.querySelectorAll('.item');
            for(let i=0; i < items.length; i++) {
                await updateDoc(doc(db, col, items[i].dataset.id), { order: i });
            }
        }

        window.deleteItem = async (col, id) => { if(confirm("Deseja excluir?")) await deleteDoc(doc(db, col, id)); };
    </script>
</body>
</html>
