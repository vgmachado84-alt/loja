<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Center Pet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #2d5a27; --orange: #ff7800; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 50px; }
        
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #eee; }
        .login-card { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-card button { width: 100%; background: var(--orange); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #admin-wrapper { display: none; }
        .tabs { display: flex; background: var(--green); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px; border: none; color: white; background: none; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .tab-btn.active { background: #1e3d1a; border-bottom: 3px solid #fff; }
        .tab-content { display: none; padding: 15px; max-width: 650px; margin: auto; }
        .tab-content.active { display: block; }
        
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Área de Upload Restaurada */
        .upload-area { border: 2px dashed var(--green); padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 10px; cursor: pointer; background: #f9fff9; }
        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 15px; display: none; overflow: hidden; }
        #progresso-fill { height: 100%; background: var(--orange); width: 0%; transition: 0.2s; }

        .item { display: flex; justify-content: space-between; background: white; padding: 12px; margin-top: 8px; border-radius: 8px; align-items: center; border: 1px solid #eee; }
        .prod-info { flex: 1; font-size: 13px; display: flex; align-items: center; }
        .img-lista { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; margin-right: 12px; background: #eee; border: 1px solid #ddd; }
        .prod-text b { color: var(--green); display: block; font-size: 14px; }
        
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 5px; margin-top: 4px; }
        .tag-price { background: #e8f5e9; color: #2e7d32; }
        .tag-info { background: #f0f2f5; color: #4b5563; border: 1px solid #ddd; }

        .btn-acao { background: #eee; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 5px; }
        .var-box { background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--green)">CENTER PET ADMIN</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button id="btn-login">ENTRAR</button>
        </div>
    </div>

    <div id="admin-wrapper">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('t-pedidos')">📥 PEDIDOS</button>
            <button class="tab-btn" onclick="openTab('t-produtos')">📦 PRODUTOS</button>
            <button class="tab-btn" onclick="openTab('t-categorias')">📂 CATEGORIAS</button>
            <button class="tab-btn" onclick="deslogar()" style="color:#ffcccc">SAIR</button>
        </div>

        <div id="t-pedidos" class="tab-content active"><div id="lista-pedidos"></div></div>

        <div id="t-produtos" class="tab-content">
            <div class="box">
                <h3 style="margin-top:0; color:var(--green)">Cadastrar / Editar</h3>
                
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <span id="upload-status">📷 Clique para carregar Foto da Galeria</span>
                    <input type="file" id="file-input" accept="image/*" style="display:none">
                </div>
                <div class="progress-bar" id="p-bar"><div id="progresso-fill"></div></div>
                
                <input type="hidden" id="p-img">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="p-code" placeholder="Cód/Ref">
                    <input type="number" id="p-stock" placeholder="Qtd Estoque">
                </div>
                <input type="text" id="p-name" placeholder="Nome do Produto">
                <textarea id="p-desc" placeholder="Descrição do produto..." rows="2"></textarea>
                <select id="p-cat"></select>
                
                <div id="p-vars-area"></div>
                <button onclick="addVarInput()" style="width:100%; padding:10px; border:1px solid var(--green); background:none; color:var(--green); font-weight:bold; margin-bottom: 15px; cursor: pointer;">+ Add Peso e Preço</button>
                
                <button id="btn-save-prod" style="width:100%; padding:15px; background:var(--green); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">SALVAR PRODUTO NO BANCO</button>
            </div>
            <div id="lista-produtos"></div>
        </div>

        <div id="t-categorias" class="tab-content">
            <div class="box">
                <input type="text" id="n-cat" placeholder="Nome da Categoria">
                <button onclick="addCategoria()" style="width:100%; padding:10px; background:var(--green); color:white; border:none; border-radius:8px;">SALVAR CATEGORIA</button>
            </div>
            <div id="lista-categorias"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const conf = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.appspot.com",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let editId = null;

        const fMoeda = (v) => Number(v).toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});

        // LOGIN
        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => alert("Acesso negado!"));
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-screen').style.display='none';
                document.getElementById('admin-wrapper').style.display='block';
                carregarDados();
            } else {
                document.getElementById('login-screen').style.display='flex';
                document.getElementById('admin-wrapper').style.display='none';
            }
        });

        // UPLOAD COM PROGRESSO
        document.getElementById('file-input').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('p-bar').style.display = 'block';
            const sRef = ref(storage, 'fotos_produtos/' + Date.now() + "_" + file.name);
            const task = uploadBytesResumable(sRef, file);
            task.on('state_changed', 
                s => document.getElementById('progresso-fill').style.width = (s.bytesTransferred/s.totalBytes)*100+"%",
                err => alert("Erro no Firebase Storage!"),
                () => getDownloadURL(task.snapshot.ref).then(url => {
                    document.getElementById('p-img').value = url;
                    document.getElementById('upload-status').innerText = "✅ Imagem Pronta!";
                })
            );
        };

        function carregarDados() {
            // Categorias
            onSnapshot(query(collection(db, "categorias"), orderBy("order", "asc")), snap => {
                document.getElementById('lista-categorias').innerHTML = snap.docs.map(d => `<div class="item" data-id="${d.id}"><span>☰ ${d.data().nome}</span><button onclick="apagar('categorias','${d.id}')" class="btn-acao">🗑️</button></div>`).join('');
                document.getElementById('p-cat').innerHTML = snap.docs.map(d => `<option value="${d.data().nome}">${d.data().nome}</option>`).join('');
            });

            // Produtos - EXIBINDO CÓDIGO E ESTOQUE NA LISTA
            onSnapshot(query(collection(db, "produtos"), orderBy("order", "asc")), snap => {
                window.meusProds = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('lista-produtos').innerHTML = window.meusProds.map(p => `
                    <div class="item" data-id="${p.id}">
                        <div class="prod-info">
                            <img src="${p.img || ''}" class="img-lista">
                            <div class="prod-text">
                                <b>${p.name || p.nome}</b>
                                <span class="tag tag-info">CÓD: ${p.code || '---'}</span>
                                <span class="tag tag-info">ESTOQUE: ${p.stock || 0}</span>
                                <span class="tag tag-price">${fMoeda(p.variations?.[0]?.price || 0)}</span>
                            </div>
                        </div>
                        <button onclick="editarProd('${p.id}')" class="btn-acao">✏️</button>
                        <button onclick="apagar('produtos','${p.id}')" class="btn-acao">🗑️</button>
                    </div>`).join('');
            });
        }

        window.addVarInput = (w="", p="") => {
            const div = document.createElement('div');
            div.className = 'var-box';
            div.innerHTML = `<div style="display:flex; gap:5px;"><input type="text" placeholder="Peso/Tam" class="v-w" value="${w}"><input type="text" placeholder="Preço" class="v-p" value="${p}"></div><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; font-size:10px; cursor:pointer;">[remover]</button>`;
            document.getElementById('p-vars-area').appendChild(div);
        };

        document.getElementById('btn-save-prod').onclick = async () => {
            const vars = Array.from(document.querySelectorAll('.var-box')).map(r => ({
                weight: r.querySelector('.v-w').value,
                price: parseFloat(r.querySelector('.v-p').value.replace(',','.')) || 0
            }));

            const dts = {
                name: document.getElementById('p-name').value,
                img: document.getElementById('p-img').value,
                code: document.getElementById('p-code').value,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                desc: document.getElementById('p-desc').value,
                cat: document.getElementById('p-cat').value,
                variations: vars, updatedAt: serverTimestamp()
            };

            if(editId) await updateDoc(doc(db, "produtos", editId), dts);
            else { dts.order = 0; await addDoc(collection(db, "produtos"), dts); }
            
            cancelarCampos();
            alert("Produto Salvo com Sucesso!");
        };

        window.editarProd = (id) => {
            const p = window.meusProds.find(x => x.id === id);
            editId = id;
            document.getElementById('p-name').value = p.name || p.nome;
            document.getElementById('p-img').value = p.img || "";
            document.getElementById('p-code').value = p.code || "";
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-desc').value = p.desc || "";
            document.getElementById('p-cat').value = p.cat;
            document.getElementById('p-vars-area').innerHTML = "";
            if(p.variations) p.variations.forEach(v => addVarInput(v.weight, v.price));
            document.getElementById('upload-status').innerText = "✅ Foto Atual Carregada";
            window.scrollTo(0,0);
        };

        function cancelarCampos() {
            editId = null;
            document.querySelectorAll('#t-produtos input:not([type=button])').forEach(i => i.value = "");
            document.getElementById('p-vars-area').innerHTML = "";
            document.getElementById('p-bar').style.display = 'none';
            document.getElementById('upload-status').innerText = "📷 Clique para carregar Foto da Galeria";
        }

        window.addCategoria = async () => {
            const n = document.getElementById('n-cat').value;
            if(n) await addDoc(collection(db, "categorias"), { nome: n, order: 0 });
            document.getElementById('n-cat').value = "";
        };

        window.apagar = async (c, id) => { if(confirm("Tem certeza que deseja apagar?")) await deleteDoc(doc(db, c, id)); };
        window.deslogar = () => signOut(auth);
        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        Sortable.create(document.getElementById('lista-categorias'), { animation: 150, onEnd: () => salvarOrdem("categorias", "lista-categorias") });
        Sortable.create(document.getElementById('lista-produtos'), { animation: 150, onEnd: () => salvarOrdem("produtos", "lista-produtos") });

        async function salvarOrdem(col, listId) {
            const itens = document.getElementById(listId).querySelectorAll('.item');
            for(let i=0; i<itens.length; i++) await updateDoc(doc(db, col, itens[i].dataset.id), { order: i });
        }
    </script>
</body>
</html>
