<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Center Pet</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .orange-bar { background: #ff7800; color: white; padding: 15px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        button { width: 100%; background: #ff7800; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #admin-content { display: none; padding: 15px; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        
        /* Estilo do Formulário */
        .form-card { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 2px solid #ff7800; }
        .form-title { font-weight: bold; color: #ff7800; margin-bottom: 10px; display: block; text-transform: uppercase; font-size: 12px; }

        .prod-card { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee; }
        .prod-img { width: 50px; height: 50px; object-fit: contain; border-radius: 8px; background: #f9f9f9; }
        .prod-info { flex: 1; }
        .prod-name { font-weight: bold; font-size: 13px; color: #333; margin: 0; }
        .prod-meta { font-size: 11px; color: #888; margin: 2px 0; }
        .btn-del { background: #fff1f1; color: #ff4444; border: none; padding: 10px; border-radius: 10px; font-weight: bold; width: auto; margin: 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card">
            <div class="orange-bar">CENTER PET ADMIN</div>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="handleLogin()">ENTRAR</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <b style="color: #ff7800;">CENTER PET ADMIN</b>
            <button onclick="handleLogout()" style="background:none; color: #888; width: auto; padding: 0; font-size: 12px;">SAIR</button>
        </div>

        <br>

        <div class="form-card">
            <span class="form-title">Cadastrar Novo Produto</span>
            <input type="text" id="p-name" placeholder="Nome do Produto">
            <input type="text" id="p-img" placeholder="Link da Imagem">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="p-price" placeholder="Preço (ex: 25,00)">
                <input type="number" id="p-stock" placeholder="Estoque">
            </div>
            <select id="p-cat">
                <option value="Acessórios">Acessórios</option>
                <option value="Rações">Rações</option>
                <option value="Pássaros">Pássaros</option>
                <option value="Higiene">Higiene</option>
            </select>
            <button onclick="saveProduct()" id="btn-save">SALVAR NO ESTOQUE</button>
        </div>

        <div style="display: flex; justify-content: space-between; margin: 20px 0 10px;">
            <b style="font-size: 12px; color: #666;">SEU ESTOQUE</b>
            <span id="counter" style="font-size: 12px; color: #ff7800; font-weight: bold;">0 itens</span>
        </div>

        <div id="list-prods"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfh8GKuOt7Jqeg1GJJLaK54KFydQhYgV0",
            authDomain: "birdselect-d96b8.firebaseapp.com",
            projectId: "birdselect-d96b8",
            storageBucket: "birdselect-d96b8.firebasestorage.app",
            messagingSenderId: "758168536506",
            appId: "1:758168536506:web:26cebc129c97b6da5b8983"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LOGIN
        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Dados incorretos!"));
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadInventory();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        // SALVAR PRODUTO
        window.saveProduct = async () => {
            const btn = document.getElementById('btn-save');
            const name = document.getElementById('p-name').value;
            const img = document.getElementById('p-img').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            const cat = document.getElementById('p-cat').value;

            if(!name || !price) return alert("Preencha nome e preço!");

            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            await addDoc(collection(db, "produtos"), {
                name, img, price, stock, cat,
                order: Date.now() 
            });

            // Limpa campos
            document.getElementById('p-name').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-stock').value = "";
            
            btn.innerText = "SALVAR NO ESTOQUE";
            btn.disabled = false;
        };

        // CARREGAR LISTA
        function loadInventory() {
            onSnapshot(query(collection(db, "produtos"), orderBy("order", "desc")), snap => {
                const list = document.getElementById('list-prods');
                document.getElementById('counter').innerText = snap.size + " itens";
                
                list.innerHTML = snap.docs.map(d => {
                    const p = d.data();
                    return `
                        <div class="prod-card">
                            <img src="${p.img || 'https://via.placeholder.com/50'}" class="prod-img">
                            <div class="prod-info">
                                <p class="prod-name">${p.name}</p>
                                <p class="prod-meta">${p.cat} • R$ ${p.price}</p>
                            </div>
                            <button onclick="deleteItem('${d.id}')" class="btn-del">🗑</button>
                        </div>
                    `;
                }).join('');
            });
        }

        window.deleteItem = async (id) => {
            if(confirm("Excluir produto?")) await deleteDoc(doc(db, "produtos", id));
        };
    </script>
</body>
</html>
